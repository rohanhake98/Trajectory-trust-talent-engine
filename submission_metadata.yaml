methodology_summary: |
  A full-stack, CPU-optimized Talent Intelligence Engine combining Static Fit, Career Trajectory, Recruitability/Convertibility, and a Multiplicative Anomaly Shield (Honeypot Filter) to demote synthetic/keyword-stuffed profiles. Uses NetworkX directed transition networks to trace candidate career velocity pathways, and FastAPI to serve the interactive web dashboard. Runs in under 3 minutes locally on 100K profiles.

